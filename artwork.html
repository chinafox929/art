                    artistBio: '王希孟（1096-？），北宋画家。徽宗崇宁三年（1104）入宫为生徒，经宋徽宗赵佶亲授指点笔墨技法，艺精进。徽宗政和三年（1113）四月，王希孟用了半年时间，绘成《千里江山图》卷，时年仅18岁。'
                },
                'fuchun': {
                    title: '富春山居图',
                    artist: '黄公望',
                    year: '元代',
                    museum: '台北故宫博物院/浙江省博物馆',
                    image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/2/2c/Dwelling_in_the_Fuchun_Mountains_%28The_Remaining_Mountain%29.jpg/800px-Dwelling_in_the_Fuchun_Mountains_%28The_Remaining_Mountain%29.jpg',
                    description: '《富春山居图》是元代画家黄公望创作的纸本水墨画，中国十大传世名画之一。画家以浙江富春江为背景，全图用墨淡雅，山和水的布置疏密得当，墨色浓淡干湿并用，极富于变化。此画在明代末年被焚为两段，前段现藏浙江省博物馆，后段现藏台北故宫博物院。',
                    artistBio: '黄公望（1269-1354），元代画家，本姓陆，名坚，汉族，江浙行省常熟县人。后过继永嘉府（今浙江温州市）平阳县黄氏为义子，因改姓名，字子久，号一峰、大痴道人。擅画山水，师法董源、巨然，兼修李成法，得赵孟頫指授。'
                },
                'lishan': {
                    title: '万山红遍',
                    artist: '李可染',
                    year: '1964年',
                    museum: '北京画院',
                    image: 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/9f/Li_Keran_-_Landscape.jpg/800px-Li_Keran_-_Landscape.jpg',
                    description: '《万山红遍》是李可染以毛泽东《沁园春·长沙》词意为母题创作的山水画。画家以朱砂点染山林，开创了红色山水的新风格。画面中层林尽染，万山红遍，气势磅礴，展现了新中国山水画革新的成就。',
                    artistBio: '李可染（1907-1989），江苏徐州人，中国近代杰出的画家、诗人。李可染自幼即喜绘画，13岁时学画山水。43岁任中央美术学院教授，49岁为变革山水画，行程数万里旅行写生。72岁任中国美术家协会副主席、中国画研究院院长。'
                }
            }
        };

        // 从 URL 获取参数
        const urlParams = new URLSearchParams(window.location.search);
        const gallery = urlParams.get('gallery') || 'impressionism';
        const id = urlParams.get('id') || 'monet-sunrise';

        // 加载作品信息
        const galleryData = artworks[gallery];
        const artwork = galleryData ? galleryData[id] : null;
        if (artwork) {
            document.getElementById('artwork-content').innerHTML = `
                <div class="artwork-header">
                    <h1>${artwork.title}</h1>
                    <p class="artwork-meta">${artwork.artist} · ${artwork.year} · ${artwork.museum}</p>
                </div>
                <div class="artwork-image">
                    <img src="${artwork.image}" alt="${artwork.title}">
                </div>
                <div class="artwork-content">
                    <div class="artwork-description">
                        <h2>作品介绍</h2>
                        <p>${artwork.description}</p>
                        ${artwork.videoUrl ? `
                        <div class="video-section" style="margin-top: 30px; padding: 20px; background: #1a1a1a; border-radius: 8px;">
                            <h3 style="color: #c9a96e; margin-bottom: 15px;">📺 视频介绍</h3>
                            <p style="margin-bottom: 15px;">${artwork.videoTitle || '相关视频讲解'}</p>
                            <a href="${artwork.videoUrl}" target="_blank" style="display: inline-block; padding: 12px 24px; background: #c9a96e; color: #000; text-decoration: none; border-radius: 6px; font-weight: bold;">观看视频</a>
                        </div>
                        ` : ''}
                    </div>
                    <div class="artist-info">
                        <h3>关于艺术家</h3>
                        <p>${artwork.artistBio}</p>
                    </div>
                </div>
            `;
        } else {
            document.getElementById('artwork-content').innerHTML = `
                <div style="text-align: center; padding: 100px 0;">
                    <h2>作品信息加载中...</h2>
                    <p style="color: #666; margin-top: 20px;">请从展厅页面选择作品查看详情</p>
                </div>
            `;
        }
    </script>
</body>
</html>
